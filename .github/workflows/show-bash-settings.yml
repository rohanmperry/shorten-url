name: Show Debug Information

on:
  workflow_dispatch:

jobs:
  show-bash-settings:
    name: Show Bash Settings
    runs-on: ubuntu-latest
    steps:
      - name: Show ENV
        run: env

      - name: Show options
        run: echo "$-"

  show-files:
    name: Show files
    runs-on: ubuntu-latest
    steps:
      - name: Show files
        run: ls -lR
