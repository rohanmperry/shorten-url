name: prs

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.5"
  TF_IN_AUTOMATION: true

jobs:
  setup-shared:
    name: Setup Shared
    uses: ./.github/workflows/setup-shared.yaml
    with:
      runs-on: ubuntu-latest
      aws-web-role-arn: 'arn:aws:iam::659212880322:role/github-actions'

  tf-init-validate:
    name: TF Init and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init and validate
        run: |
            terraform -chdir=terraform init -backend=false
            make validate
